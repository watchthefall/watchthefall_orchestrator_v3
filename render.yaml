services:
  - type: web
    name: watchthefall-orchestrator-v3
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -c portal/gunicorn.conf.py portal.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.6
      - key: RENDER
        value: "true"
      - key: ENV
        value: production
      # Phase 18: in-memory brand_render_jobs dict requires single worker.
      # Multiple workers = job_ids 404 across workers on poll.
      # Remove once job state is persisted to SQLite/Redis.
      - key: WEB_CONCURRENCY
        value: "1"
      # Persistent disk — paths must be inside the mountPath below (/var/data).
      - key: DB_PATH
        value: /var/data/wtf_studio.db
      - key: STORAGE_ROOT
        value: /var/data/storage
    headers:
      - type: global
        forward:
          - Cf-Access-Jwt-Assertion

disk:
  name: brandr-data
  mountPath: /var/data
  sizeGB: 10