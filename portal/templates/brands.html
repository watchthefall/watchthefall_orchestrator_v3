<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Management | WTF Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 { font-size: 28px; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #00b7ff;
            color: #fff;
        }
        .btn-primary:hover { background: #0099dd; transform: translateY(-2px); }
        .btn-secondary {
            background: #666;
            color: #fff;
        }
        .btn-secondary:hover { background: #555; }
        .btn-danger {
            background: #c00;
            color: #fff;
        }
        .btn-danger:hover { background: #a00; }
        
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .brand-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }
        .brand-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .brand-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
        }
        
        .brand-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .brand-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .badge-system {
            background: #28a745;
            color: #fff;
        }
        .badge-user {
            background: #00b7ff;
            color: #fff;
        }
        
        .brand-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .brand-actions button {
            flex: 1;
            padding: 8px;
            font-size: 13px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00b7ff;
        }
        
        .status-msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .status-msg.success { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status-msg.error { background: rgba(204, 0, 0, 0.2); color: #f66; }
        .status-msg.info { background: rgba(0, 183, 255, 0.2); color: #00b7ff; }
        
        /* Nav Bar */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 20px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid #333;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            border-color: #00b7ff;
            color: #00b7ff;
        }
        .nav-btn.active {
            border-color: #00b7ff;
            background: #00b7ff;
            color: #000;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background: rgba(26, 26, 46, 0.95);
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1;
            top: 100%;
            right: 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .dropdown-content a {
            color: #aaa;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #00b7ff;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        /* Canvas Editor Styles */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 20px;
        }
        .canvas-container {
            background: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        #brandCanvas {
            max-width: 100%;
            max-height: 600px;
            cursor: move;
            border: 2px solid #333;
        }
        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
        }
        .control-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .control-section:last-child { border-bottom: none; }
        .control-section h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #00b7ff;
        }
        .slider-row {
            margin-bottom: 12px;
        }
        .slider-row label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .slider-row input[type="range"] {
            width: 100%;
        }
        .slider-value {
            float: right;
            color: #00b7ff;
            font-weight: 600;
        }
        input[type="file"] {
            width: 100%;
            padding: 8px;
            background: rgba(0, 183, 255, 0.1);
            border: 1px solid #00b7ff;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .toggle-switch input { display: none; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #666;
            transition: .4s;
            border-radius: 20px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider {
            background-color: #00b7ff;
        }
        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .mode-btn.active {
            background: #00b7ff;
            color: #000;
            border-color: #00b7ff;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="nav-bar">
    <div style="display: flex; gap: 10px;">
        <a href="/portal/download" class="nav-btn">📥 Downloader</a>
        <a href="/portal/brand" class="nav-btn">🎬 Brand a Video</a>
        <a href="/portal/brands" class="nav-btn active">📁 Manage Brands</a>
        <a href="/portal/shipr" class="nav-btn">🚢 Shipr (Coming Soon)</a>
    </div>
    <div class="dropdown">
        <a href="#" class="nav-btn">👤 Account</a>
        <div class="dropdown-content">
            <a href="/portal/profile">Profile</a>
            <a href="/portal/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <header>
        <h1>Brand Management</h1>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Create Brand</button>
    </header>
    
    <div id="brandGrid" class="brand-grid">
        <!-- Brands loaded here -->
    </div>
</div>

<!-- Create Brand Modal -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create New Brand</h2>
            <button class="modal-close" onclick="closeCreateModal()">×</button>
        </div>
        
        <div id="modalStatus"></div>
        
        <form id="createForm" onsubmit="createBrand(event)">
            <div class="form-group">
                <label>Brand Name (slug)</label>
                <input type="text" id="brandName" required placeholder="e.g., mybrand" pattern="[a-z0-9_-]+" title="Lowercase letters, numbers, hyphens, underscores only">
            </div>
            
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="displayName" required placeholder="e.g., My Brand">
            </div>
            
            <!-- Visual Editor -->
            <div class="editor-layout">
                <div class="canvas-container">
                    <canvas id="brandPreviewCanvas"></canvas>
                    <div style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:11px; color:#666;">
                        👆 Drag to position layers
                    </div>
                </div>
                
                <div class="controls-panel">
                    <!-- Logo Controls -->
                    <div class="control-section">
                        <h3>🎨 Logo</h3>
                        <input type="file" id="logoUpload" accept="image/png,image/jpeg" onchange="handleLogoUpload(event)">
                        <div class="slider-row">
                            <label>Scale <span class="slider-value" id="logoScaleVal">15%</span></label>
                            <input type="range" id="logoScale" min="5" max="50" value="15" oninput="updateLogoScale(this.value)">
                        </div>
                        <div class="slider-row">
                            <label>Opacity <span class="slider-value" id="logoOpacityVal">100%</span></label>
                            <input type="range" id="logoOpacity" min="0" max="100" value="100" oninput="updateLogoOpacity(this.value)">
                        </div>
                    </div>
                    
                    <!-- Watermark Controls -->
                    <div class="control-section">
                        <h3>💧 Watermark</h3>
                        <input type="file" id="watermarkUpload" accept="image/png,image/jpeg" onchange="handleWatermarkUpload(event)">
                        <div class="mode-toggle">
                            <button type="button" class="mode-btn active" id="wmFullscreenBtn" onclick="setWatermarkMode('fullscreen')">Fullscreen</button>
                            <button type="button" class="mode-btn" id="wmPositionedBtn" onclick="setWatermarkMode('positioned')">Positioned</button>
                        </div>
                        <div class="slider-row">
                            <label>Scale <span class="slider-value" id="wmScaleVal">100%</span></label>
                            <input type="range" id="wmScale" min="10" max="200" value="100" oninput="updateWmScale(this.value)">
                        </div>
                        <div class="slider-row">
                            <label>Opacity <span class="slider-value" id="wmOpacityVal">10%</span></label>
                            <input type="range" id="wmOpacity" min="0" max="100" value="10" oninput="updateWmOpacity(this.value)">
                        </div>
                    </div>
                    
                    <!-- Text Controls -->
                    <div class="control-section">
                        <h3>✏️ Text Overlay</h3>
                        <label style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <span>Enable Text</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="textEnabled" onchange="toggleText(this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </label>
                        <div id="textControls" style="display:none;">
                            <div class="form-group">
                                <input type="text" id="textContent" placeholder="Enter text..." oninput="updateText()">
                            </div>
                            <div class="slider-row">
                                <label>Font Size <span class="slider-value" id="textSizeVal">48px</span></label>
                                <input type="range" id="textSize" min="24" max="96" value="48" oninput="updateTextSize(this.value)">
                            </div>
                            <div class="slider-row">
                                <label>Color</label>
                                <input type="color" id="textColor" value="#FFFFFF" onchange="updateTextColor(this.value)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">Create Brand</button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/brand_editor.js') }}"></script>
<script>
const apiBase = window.location.origin;
let editor = null;

// Load brands on page load
loadBrands();

async function loadBrands() {
    try {
        // Load ONLY user-owned brands (no SYSTEM brands)
        const res = await fetch(`${apiBase}/api/brands?include_system=false`);
        const data = await res.json();
        
        if (!data.success) {
            throw new Error(data.error || 'Failed to load brands');
        }
        
        // Safety filter: exclude any SYSTEM brands from display
        const userBrands = data.brands.filter(b => !b.is_system);
        
        renderBrands(userBrands);
    } catch (err) {
        document.getElementById('brandGrid').innerHTML = `<div class="status-msg error">${err.message}</div>`;
    }
}

function renderBrands(brands) {
    const grid = document.getElementById('brandGrid');
    grid.innerHTML = '';
    
    // Handle empty state - new users with zero brands
    if (brands.length === 0) {
        grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                <div style="font-size: 48px; margin-bottom: 20px;">🎨</div>
                <h2 style="margin-bottom: 12px;">No Brands Yet</h2>
                <p style="color: #aaa; margin-bottom: 24px;">Create your first brand to get started with custom watermarks and logos</p>
                <button class="btn btn-primary" onclick="openCreateModal()">✨ Create Your First Brand</button>
            </div>
        `;
        return;
    }
    
    brands.forEach(brand => {
        const card = document.createElement('div');
        card.className = 'brand-card';
        
        const logo = brand.logo_path ? `${apiBase}/api/preview/logo/${brand.name}` : '';
        // Only show USER badge for user brands (no SYSTEM brands should be here)
        const badge = '<span class="brand-badge badge-user">USER</span>';
        const deleteBtn = `<button class="btn btn-danger" onclick="deleteBrand(${brand.id}, '${brand.name}')">Delete</button>`;
        
        card.innerHTML = `
            ${logo ? `<img src="${logo}" class="brand-logo" alt="${brand.display_name}">` : ''}
            ${badge}
            <div class="brand-name">${brand.display_name}</div>
            <div class="brand-actions">
                <button class="btn btn-secondary" onclick="editBrand(${brand.id})">Edit</button>
                ${deleteBtn}
            </div>
        `;
        
        grid.appendChild(card);
    });
}

function openCreateModal() {
    document.getElementById('createModal').classList.add('active');
    const form = document.getElementById('createForm');
    form.reset();
    form.dataset.mode = 'create';
    delete form.dataset.brandId;
    document.getElementById('modalStatus').innerHTML = '';
    
    // Initialize editor
    if (!editor) {
        editor = initBrandEditor();
    }
    
    // Re-enable brand name field
    document.getElementById('brandName').disabled = false;
    
    // Reset UI controls
    document.getElementById('textControls').style.display = 'none';
    document.getElementById('wmFullscreenBtn').classList.add('active');
    document.getElementById('wmPositionedBtn').classList.remove('active');
    
    // Reset button text
    form.querySelector('button[type="submit"]').textContent = 'Create Brand';
}

// Control handlers
function handleLogoUpload(e) {
    const file = e.target.files[0];
    if (file && editor) {
        editor.loadImage(file, 'logo');
    }
}

function handleWatermarkUpload(e) {
    const file = e.target.files[0];
    if (file && editor) {
        editor.loadImage(file, 'watermark');
    }
}

function updateLogoScale(value) {
    document.getElementById('logoScaleVal').textContent = value + '%';
    if (editor) {
        editor.updateState({ logoScale: parseFloat(value) / 100 });
    }
}

function updateLogoOpacity(value) {
    document.getElementById('logoOpacityVal').textContent = value + '%';
    if (editor) {
        editor.updateState({ logoOpacity: parseFloat(value) / 100 });
    }
}

function setWatermarkMode(mode) {
    if (mode === 'fullscreen') {
        document.getElementById('wmFullscreenBtn').classList.add('active');
        document.getElementById('wmPositionedBtn').classList.remove('active');
    } else {
        document.getElementById('wmFullscreenBtn').classList.remove('active');
        document.getElementById('wmPositionedBtn').classList.add('active');
    }
    if (editor) {
        editor.updateState({ wmMode: mode });
    }
}

function updateWmScale(value) {
    document.getElementById('wmScaleVal').textContent = value + '%';
    if (editor) {
        editor.updateState({ wmScale: parseFloat(value) / 100 });
    }
}

function updateWmOpacity(value) {
    document.getElementById('wmOpacityVal').textContent = value + '%';
    if (editor) {
        editor.updateState({ wmOpacity: parseFloat(value) / 100 });
    }
}

function toggleText(enabled) {
    document.getElementById('textControls').style.display = enabled ? 'block' : 'none';
    if (editor) {
        editor.updateState({ textEnabled: enabled });
    }
}

function updateText() {
    const content = document.getElementById('textContent').value;
    if (editor) {
        editor.updateState({ textContent: content });
    }
}

function updateTextSize(value) {
    document.getElementById('textSizeVal').textContent = value + 'px';
    if (editor) {
        editor.updateState({ textSize: parseInt(value) });
    }
}

function updateTextColor(value) {
    if (editor) {
        editor.updateState({ textColor: value });
    }
}

function closeCreateModal() {
    document.getElementById('createModal').classList.remove('active');
}

async function createBrand(e) {
    e.preventDefault();
    
    const form = document.getElementById('createForm');
    const mode = form.dataset.mode || 'create';
    const brandId = form.dataset.brandId;
    const status = document.getElementById('modalStatus');
    
    status.innerHTML = `<div class="status-msg info">${mode === 'edit' ? 'Saving changes...' : 'Creating brand...'}</div>`;
    
    try {
        // Get editor state
        const editorState = editor ? editor.exportState() : {};
        
        const payload = {
            name: document.getElementById('brandName').value,
            display_name: document.getElementById('displayName').value,
            // Visual positioning from editor
            ...editorState
        };
        
        let res;
        if (mode === 'edit') {
            // PUT to update existing brand
            res = await fetch(`${apiBase}/api/brands/${brandId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } else {
            // POST to create new brand
            res = await fetch(`${apiBase}/api/brands`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        
        const data = await res.json();
        
        if (!data.success) {
            throw new Error(data.error || `Failed to ${mode} brand`);
        }
        
        status.innerHTML = `<div class="status-msg success">✅ Brand ${mode === 'edit' ? 'updated' : 'created'} successfully!</div>`;
        setTimeout(() => {
            closeCreateModal();
            loadBrands();
        }, 1000);
        
    } catch (err) {
        status.innerHTML = `<div class="status-msg error">❌ ${err.message}</div>`;
    }
}

function editBrand(brandId) {
    // Fetch brand data and open editor
    fetch(`${apiBase}/api/brands/${brandId}`)
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                throw new Error(data.error || 'Failed to load brand');
            }
            
            const brand = data.brand;
            
            // Open modal
            document.getElementById('createModal').classList.add('active');
            document.getElementById('modalStatus').innerHTML = '';
            
            // Initialize editor if needed
            if (!editor) {
                editor = initBrandEditor();
            }
            
            // Set form to edit mode
            const form = document.getElementById('createForm');
            form.dataset.mode = 'edit';
            form.dataset.brandId = brandId;
            
            // Populate fields
            document.getElementById('brandName').value = brand.name;
            document.getElementById('brandName').disabled = true; // Can't change slug
            document.getElementById('displayName').value = brand.display_name;
            
            // Load editor state
            editor.loadState(brand);
            
            // Update UI controls to match loaded state
            document.getElementById('logoScale').value = (brand.logo_scale || 0.15) * 100;
            document.getElementById('logoScaleVal').textContent = Math.round((brand.logo_scale || 0.15) * 100) + '%';
            document.getElementById('logoOpacity').value = (brand.logo_opacity || 1.0) * 100;
            document.getElementById('logoOpacityVal').textContent = Math.round((brand.logo_opacity || 1.0) * 100) + '%';
            
            const wmMode = brand.wm_mode || 'fullscreen';
            if (wmMode === 'fullscreen') {
                document.getElementById('wmFullscreenBtn').classList.add('active');
                document.getElementById('wmPositionedBtn').classList.remove('active');
            } else {
                document.getElementById('wmFullscreenBtn').classList.remove('active');
                document.getElementById('wmPositionedBtn').classList.add('active');
            }
            
            document.getElementById('wmScale').value = (brand.wm_scale || 1.0) * 100;
            document.getElementById('wmScaleVal').textContent = Math.round((brand.wm_scale || 1.0) * 100) + '%';
            document.getElementById('wmOpacity').value = (brand.wm_opacity || 0.10) * 100;
            document.getElementById('wmOpacityVal').textContent = Math.round((brand.wm_opacity || 0.10) * 100) + '%';
            
            const textEnabled = brand.text_enabled || false;
            document.getElementById('textEnabled').checked = textEnabled;
            document.getElementById('textControls').style.display = textEnabled ? 'block' : 'none';
            
            if (textEnabled) {
                document.getElementById('textContent').value = brand.text_content || '';
                document.getElementById('textSize').value = brand.text_size || 48;
                document.getElementById('textSizeVal').textContent = (brand.text_size || 48) + 'px';
                document.getElementById('textColor').value = brand.text_color || '#FFFFFF';
            }
            
            // Change button text
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Save Changes';
        })
        .catch(err => {
            alert('Error loading brand: ' + err.message);
        });
}

async function deleteBrand(brandId, brandName) {
    if (!confirm(`Delete brand "${brandName}"? This cannot be undone.`)) return;
    
    try {
        const res = await fetch(`${apiBase}/api/brands/${brandId}`, { method: 'DELETE' });
        const data = await res.json();
        
        if (!data.success) {
            throw new Error(data.error || 'Failed to delete brand');
        }
        
        alert('Brand deleted successfully');
        loadBrands();
    } catch (err) {
        alert(`Error: ${err.message}`);
    }
}
</script>
