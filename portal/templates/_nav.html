{# Navigation partial - include with: {% include '_nav.html' %} #}
{# Set active_page variable before including: {% set active_page = 'dashboard' %} #}

<style>
/* Standardized Navigation - Tier-Aware Design System */
.nav-bar {
    background-color: #202024;
    padding: 0.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
}
.nav-bar .nav-links {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: nowrap;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
.nav-bar .nav-links::-webkit-scrollbar {
    display: none;
}
.nav-bar .nav-links li {
    margin: 0.25rem;
}
.nav-bar .nav-links a {
    color: #EAEAEA;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    transition: background-color 0.3s;
    display: block;
    white-space: nowrap;
}
.nav-bar .nav-links a:hover {
    background-color: var(--accent-soft);
}
.nav-bar .nav-links a.active {
    background-color: var(--accent-soft);
    color: var(--accent);
}

/* Identity cluster: badges + account dropdown grouped right */
.nav-identity {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    margin-left: auto;
}
.nav-badges {
    display: flex;
    align-items: center;
    gap: 4px;
}
.nav-badges .tier-badge {
    font-size: 10px;
    padding: 3px 9px;
    cursor: default;
}

.nav-bar .dropdown {
    position: relative;
    display: inline-block;
}
.nav-bar .dropdown > a {
    color: #EAEAEA;
    text-decoration: none;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    transition: background-color 0.3s;
    display: block;
    cursor: pointer;
    font-size: 14px;
}
.nav-bar .dropdown > a:hover {
    background-color: var(--accent-soft);
}
.nav-bar .dropdown-content {
    display: none;
    position: absolute;
    background-color: #202024;
    min-width: 160px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    z-index: 101;
    right: 0;
    border-radius: 8px;
    overflow: hidden;
}
.nav-bar .dropdown-content a {
    color: #EAEAEA;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}
.nav-bar .dropdown-content a:hover {
    background-color: var(--accent-soft);
}
.nav-bar .dropdown:hover .dropdown-content,
.nav-bar .dropdown:focus-within .dropdown-content {
    display: block;
}

/* Tier accent line on nav bottom — subtle identity cue */
.nav-bar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    opacity: 0.6;
}

/* Nav logo — tier-specific icon, driven by --tier-icon CSS var */
.nav-bar .nav-logo {
    width: 32px;
    height: 32px;
    background-image: var(--tier-icon);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    display: block;
    flex-shrink: 0;
    margin-right: 2px;
    transition: filter 0.3s;
}
.nav-bar .nav-logo:hover {
    filter: drop-shadow(0 0 4px var(--accent-glow));
}

/* Mobile: collapse badges, show only primary */
@media screen and (max-width: 768px) {
    .nav-bar {
        justify-content: flex-start;
    }
    .nav-bar .nav-links {
        display: flex;
        flex-wrap: nowrap;
        white-space: nowrap;
    }
    .nav-bar .nav-links a {
        flex-shrink: 0;
        padding: 10px 12px;
    }
    .nav-badges .badge-secondary {
        display: none;
    }
    .nav-identity {
        margin-left: auto;
        gap: 4px;
    }
    .nav-bar .dropdown > a {
        flex-shrink: 0;
        padding: 10px 8px;
        font-size: 13px;
    }
}

@media screen and (max-width: 360px) {
    .nav-bar .nav-links a {
        font-size: 14px;
        padding: 8px 10px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .nav-bar .dropdown > a {
        font-size: 13px;
        padding: 8px 6px;
    }
    .nav-badges {
        display: none;
    }
}
</style>

<div class="nav-bar">
    <a href="{{ url_for('brand_video') }}" class="nav-logo" title="Brandr — {{ tier|default('Explorer') }}"></a>
    <ul class="nav-links">
        <li><a href="{{ url_for('brand_video') }}"{% if active_page == 'brand_video' %} class="active"{% endif %}>Create</a></li>
        <li><a href="{{ url_for('brands_page') }}"{% if active_page == 'brands_page' %} class="active"{% endif %}>Brands</a></li>
        <li><a href="{{ url_for('library') }}"{% if active_page == 'library' %} class="active"{% endif %}>Library</a></li>
    </ul>
    <div class="nav-identity">
        <div class="dropdown">
            <a href="#" tabindex="0">Account &#x25BE;</a>
            <div class="dropdown-content">
                <a href="{{ url_for('profile_page') }}">Profile</a>
                {% if is_admin_user %}
                <a href="{{ url_for('admin_console') }}" style="color:#C7A53C;">Admin</a>
                {% endif %}
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
</div>
