{# Navigation partial - include with: {% include '_nav.html' %} #}
{# Set active_page variable before including: {% set active_page = 'dashboard' %} #}

<style>
/* Standardized Navigation - single source of truth */
.nav-bar {
    background-color: #111;
    padding: 0.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
}
.nav-bar .nav-links {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: nowrap;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
.nav-bar .nav-links::-webkit-scrollbar {
    display: none;
}
.nav-bar .nav-links li {
    margin: 0.25rem;
}
.nav-bar .nav-links a {
    color: #00b7ff;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    transition: background-color 0.3s;
    display: block;
    white-space: nowrap;
}
.nav-bar .nav-links a:hover {
    background-color: #333;
}
.nav-bar .nav-links a.active {
    background-color: rgba(0, 183, 255, 0.15);
    color: #00b7ff;
}
.nav-bar .dropdown {
    position: relative;
    display: inline-block;
}
.nav-bar .dropdown > a {
    color: #00b7ff;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    transition: background-color 0.3s;
    display: block;
    cursor: pointer;
}
.nav-bar .dropdown > a:hover {
    background-color: #333;
}
.nav-bar .dropdown-content {
    display: none;
    position: absolute;
    background-color: #222;
    min-width: 160px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    z-index: 101;
    right: 0;
    border-radius: 8px;
    overflow: hidden;
}
.nav-bar .dropdown-content a {
    color: #00b7ff;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
}
.nav-bar .dropdown-content a:hover {
    background-color: #333;
}
.nav-bar .dropdown:hover .dropdown-content {
    display: block;
}

/* Mobile Responsive Fix: Swipeable Horizontal Nav */
@media screen and (max-width: 768px) {
    .nav-bar {
        justify-content: flex-start;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    
    .nav-bar::-webkit-scrollbar {
        display: none;
    }

    .nav-bar .nav-links {
        display: flex;
        flex-wrap: nowrap;
        white-space: nowrap;
    }

    .nav-bar .nav-links a {
        flex-shrink: 0;
        padding: 10px 12px;
    }

    .nav-bar .dropdown {
        flex-shrink: 0;
        margin-left: auto;
    }
    
    .nav-bar .dropdown > a {
        flex-shrink: 0;
        padding: 10px 12px;
    }
}
</style>

<div class="nav-bar">
    <ul class="nav-links">
        <li><a href="{{ url_for('dashboard') }}"{% if active_page == 'dashboard' %} class="active"{% endif %}>Dashboard</a></li>
        <li><a href="{{ url_for('library') }}"{% if active_page == 'library' %} class="active"{% endif %}>Library</a></li>
        <li><a href="{{ url_for('brand_video') }}"{% if active_page == 'brand_video' %} class="active"{% endif %}>Create</a></li>
        <li><a href="{{ url_for('brands_page') }}"{% if active_page == 'brands_page' %} class="active"{% endif %}>Brand Kit</a></li>
        <li><a href="{{ url_for('shipr_page') }}"{% if active_page == 'shipr_page' %} class="active"{% endif %}>Shipr</a></li>
    </ul>
    <div class="dropdown">
        <a href="#">Account</a>
        <div class="dropdown-content">
            <a href="{{ url_for('profile_page') }}">Profile</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>
</div>
