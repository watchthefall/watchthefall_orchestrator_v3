<!DOCTYPE html>
<html lang="en" data-tier="{{ tier|default('Explorer') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Brandr</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #121214;
            color: #EAEAEA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .change-pw-container {
            background: #202024;
            border-radius: 12px;
            padding: 40px 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 4px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: #121214;
            border: 1px solid #333;
            border-radius: 8px;
            color: #EAEAEA;
            font-size: 14px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .alert-error {
            background: rgba(224, 82, 82, 0.1);
            border: 1px solid rgba(224, 82, 82, 0.3);
            color: #e05252;
        }
        .alert-success {
            background: rgba(134, 237, 165, 0.1);
            border: 1px solid rgba(134, 237, 165, 0.3);
            color: #86EDA5;
        }
    </style>
</head>
<body>
    <div class="change-pw-container">
        <h2>Password Reset Required</h2>
        <p class="subtitle">Your password was reset by an administrator.<br>Please set a new password to continue.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="new_password">New Password:</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Set New Password</button>
        </form>
    </div>
</body>
</html>
