<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Brandr</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        /* Nav Bar */
        .nav-bar {
            background-color: #111;
            padding: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
        }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            flex-wrap: nowrap;
            flex: 1;
            min-width: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .nav-links::-webkit-scrollbar {
            display: none;
        }
        .nav-links li {
            margin: 0.25rem;
        }
        .nav-links a {
            color: #00b7ff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
            display: block;
            white-space: nowrap;
        }
        .nav-links a:hover {
            background-color: #333;
        }
        .nav-links a.active {
            background-color: #003355;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown > a {
            color: #00b7ff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
            display: block;
            cursor: pointer;
        }
        .dropdown > a:hover {
            background-color: #333;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #222;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1;
            right: 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .dropdown-content a {
            color: #00b7ff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #333;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .subtitle {
            color: #808080;
            margin-bottom: 2rem;
        }
        
        /* Actions */
        .actions {
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #4ade80;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #22c55e;
        }
        .btn-secondary {
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
        }
        .btn-secondary:hover {
            background-color: #3a3a3a;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background-color: #2d2d2d;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .empty-state h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .empty-state p {
            color: #808080;
            margin-bottom: 1.5rem;
        }
        
        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .media-card {
            background-color: #2d2d2d;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s ease;
        }
        .media-card:hover {
            border-color: #4ade80;
        }
        .media-card .filename {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .source {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .meta {
            font-size: 0.8rem;
            color: #808080;
            margin-bottom: 12px;
        }
        .media-card .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .status.available {
            background-color: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        .status.missing {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .media-card .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }
        .media-card .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    {% set active_page = 'library' %}
    {% include '_nav.html' %}
    
    <div class="container">
        <h1>Library</h1>
        <p class="subtitle">Your saved source media</p>
        
        <div class="actions">
            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
        </div>
        
        <div id="library-content">
            <div class="loading">Loading your media...</div>
        </div>
    </div>
    
    <script>
        async function loadLibrary() {
            const container = document.getElementById('library-content');
            
            try {
                const response = await fetch('/api/downloads/recent?limit=50');
                if (!response.ok) {
                    throw new Error('Failed to load library');
                }
                
                const data = await response.json();
                const downloads = data.downloads || [];
                
                if (downloads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📁</div>
                            <h2>No media yet</h2>
                            <p>Download some content to see it here</p>
                            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
                        </div>
                    `;
                    return;
                }
                
                const grid = document.createElement('div');
                grid.className = 'media-grid';
                
                downloads.forEach(download => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    const filename = download.filename || 'Unknown file';
                    const sourceUrl = download.source_url || '';
                    const truncatedUrl = sourceUrl.length > 50 ? sourceUrl.substring(0, 50) + '...' : sourceUrl;
                    const createdAt = download.created_at ? new Date(download.created_at).toLocaleDateString() : 'Unknown date';
                    const isAvailable = download.file_exists;
                    
                    card.innerHTML = `
                        <div class="filename">${escapeHtml(filename)}</div>
                        <div class="source">${escapeHtml(truncatedUrl)}</div>
                        <div class="meta">${escapeHtml(createdAt)}</div>
                        <span class="status ${isAvailable ? 'available' : 'missing'}">${isAvailable ? 'Available' : 'File missing'}</span>
                        <div class="actions">
                            ${isAvailable ? `<button class="btn btn-small" onclick="useInCreate('${escapeHtml(filename)}')">Use in Create</button>` : ''}
                            ${download.file_path ? `<a href="/portal/download-file/${download.id}" class="btn btn-secondary btn-small" download>Download</a>` : ''}
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                container.innerHTML = '';
                container.appendChild(grid);
                
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>Could not load library</h2>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn" onclick="loadLibrary()">Try Again</button>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function useInCreate(filename) {
            sessionStorage.setItem('lastDownloadFilename', filename);
            window.location.href = "{{ url_for('brand_video') }}";
        }
        
        // Load library on page load
        loadLibrary();
    </script>
</body>
</html>
