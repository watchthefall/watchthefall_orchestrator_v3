<!DOCTYPE html>
<html lang="en" data-tier="{{ tier|default('Explorer') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Brandr</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #121214;
            color: #EAEAEA;
            min-height: 100vh;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .subtitle {
            color: #808080;
            margin-bottom: 2rem;
        }

        /* Actions */
        .actions {
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent);
            color: #121214;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn-secondary {
            background-color: #2d2d2d;
            color: #EAEAEA;
            border: 1px solid #3a3a3a;
        }
        .btn-secondary:hover {
            background-color: #3a3a3a;
        }

        /* Tabs */
        .lib-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #3a3a3a;
            margin-bottom: 2rem;
        }
        .lib-tab {
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #808080;
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
        }
        .lib-tab:hover {
            color: #EAEAEA;
        }
        .lib-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .lib-panel {
            display: none;
        }
        .lib-panel.active {
            display: block;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background-color: #2d2d2d;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .empty-state h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .empty-state p {
            color: #808080;
            margin-bottom: 1.5rem;
        }

        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .media-card {
            background-color: #2d2d2d;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s ease;
        }
        .media-card:hover {
            border-color: var(--accent);
        }
        .media-card .filename {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .source {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .meta {
            font-size: 0.8rem;
            color: #808080;
            margin-bottom: 12px;
        }
        .media-card .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .status.available {
            background-color: var(--accent-soft);
            color: var(--accent);
        }
        .status.missing {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .media-card .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }
        .media-card .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .media-card .bookmark-indicator {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
        }
        .media-card .bookmark-indicator.bookmarked {
            color: var(--accent);
            font-weight: 600;
        }
        .btn-bookmark-toggle {
            background: transparent;
            border: 1px solid #444;
            color: #666;
        }
        .btn-bookmark-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Count line above panels */
        .lib-count {
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 1.25rem;
        }

        /* Source group sections for Finished Renders */
        .render-source-group {
            margin-bottom: 2.5rem;
        }
        .render-source-heading {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: baseline;
            gap: 0.6rem;
        }
        .render-source-heading .render-group-count {
            font-weight: 400;
            color: #444;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.75rem;
        }

        /* Renders toolbar */
        .renders-toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            padding: 0.75rem 1rem;
            background: #1e1e21;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }
        .renders-sel-count {
            font-size: 0.85rem;
            color: #808080;
            min-width: 80px;
        }
        .renders-cap-note {
            font-size: 0.75rem;
            color: #444;
            margin-left: auto;
        }
        .renders-toolbar-error {
            width: 100%;
            font-size: 0.8rem;
            color: #ef4444;
            margin-top: 0.25rem;
        }

        /* Render card selection checkbox */
        .render-select-label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #666;
        }
        .render-select-label:hover {
            color: #EAEAEA;
        }
        .render-select-cb {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .render-card.selected {
            border-color: var(--accent);
        }

        /* Render card unavailability */
        .render-unavailable-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            margin-bottom: 8px;
        }
        .btn-secondary:disabled,
        .btn-secondary[disabled] {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Render card specifics */
        .render-card .brand-name {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .render-card .format-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--accent-soft);
            color: var(--accent);
            margin-bottom: 10px;
        }
        .render-card .render-meta {
            font-size: 0.8rem;
            color: #808080;
            margin-bottom: 4px;
        }
        .render-card .render-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
    </style>
</head>
<body>
    {% set active_page = 'library' %}
    {% include '_nav.html' %}

    <div class="container">
        <h1>Library</h1>
        <p class="subtitle">Your saved media and finished renders</p>

        <div class="actions">
            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
        </div>

        <div class="lib-tabs">
            <button class="lib-tab" id="tab-source" onclick="switchTab('source')">Source Videos</button>
            <button class="lib-tab active" id="tab-renders" onclick="switchTab('renders')">Finished Renders</button>
        </div>

        <div class="lib-panel" id="panel-source">
            <div id="library-content">
                <div class="loading">Loading your media...</div>
            </div>
        </div>

        <div class="lib-panel active" id="panel-renders">
            <div id="renders-content">
                <div class="loading">Loading finished renders...</div>
            </div>
        </div>
    </div>

    <script>
        const FORMAT_LABELS = {
            'vertical_9_16': 'Vertical 9:16',
            'square_1_1': 'Square 1:1',
            'landscape_16_9': 'Landscape 16:9',
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchTab(tab) {
            document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.lib-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }

        // --- Source Videos ---

        async function loadLibrary() {
            const container = document.getElementById('library-content');

            try {
                const response = await fetch('/api/downloads/recent?limit=200');
                if (!response.ok) {
                    throw new Error('Failed to load library');
                }

                const data = await response.json();
                const downloads = data.downloads || [];

                if (downloads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📁</div>
                            <h2>No media yet</h2>
                            <p>Download some content to see it here</p>
                            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
                        </div>
                    `;
                    return;
                }

                const countText = document.createElement('p');
                countText.className = 'lib-count';
                countText.textContent = downloads.length >= 200
                    ? 'Showing latest 200 source videos'
                    : `Showing ${downloads.length} source video${downloads.length === 1 ? '' : 's'}`;

                const grid = document.createElement('div');
                grid.className = 'media-grid';

                downloads.forEach(download => {
                    const card = document.createElement('div');
                    card.className = 'media-card';

                    const filename = download.display_name || download.filename || 'Unknown file';
                    const sourceUrl = download.source_url || '';
                    const truncatedUrl = sourceUrl.length > 50 ? sourceUrl.substring(0, 50) + '...' : sourceUrl;
                    const createdAt = download.created_at ? new Date(download.created_at).toLocaleDateString() : 'Unknown date';
                    const isAvailable = download.file_exists;
                    const isBookmarked = download.bookmarked === 1;
                    const downloadId = download.id;

                    card.innerHTML = `
                        <div class="filename" id="fn-${downloadId}">${escapeHtml(filename)}</div>
                        <div class="rename-area" id="ra-${downloadId}" style="display:none;">
                            <input type="text" id="ri-${downloadId}" maxlength="80"
                                   style="width:100%;box-sizing:border-box;margin-bottom:4px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;padding:6px 8px;font-size:13px;"
                                   placeholder="Enter display name"
                                   onkeydown="if(event.key==='Enter')saveRename(${downloadId});else if(event.key==='Escape')cancelRename(${downloadId});">
                            <div style="display:flex;gap:6px;margin-bottom:4px;">
                                <button class="btn btn-small" onclick="saveRename(${downloadId})">Save</button>
                                <button class="btn btn-secondary btn-small" onclick="cancelRename(${downloadId})">Cancel</button>
                            </div>
                            <div id="re-${downloadId}" style="font-size:11px;color:#ff9800;display:none;margin-top:2px;"></div>
                        </div>
                        <div class="source">${escapeHtml(truncatedUrl)}</div>
                        <div class="meta">${escapeHtml(createdAt)}</div>
                        <span class="status ${isAvailable ? 'available' : 'missing'}">${isAvailable ? 'Available' : 'File missing'}</span>
                        <div class="bookmark-indicator ${isBookmarked ? 'bookmarked' : ''}">
                            ${isBookmarked ? '★ Bookmarked' : '☆ Not bookmarked'}
                        </div>
                        <div class="actions">
                            <button class="btn btn-small btn-bookmark-toggle" onclick="toggleLibraryBookmarkFull(${downloadId}, this)">
                                ${isBookmarked ? 'Remove Bookmark' : 'Bookmark'}
                            </button>
                            ${isAvailable ? `<button class="btn btn-small" onclick="useInCreate('${escapeHtml(download.filename || '')}')">Use in Create</button>` : ''}
                            ${download.file_path ? `<a href="/api/videos/download-original/${download.id}" class="btn btn-secondary btn-small">Download</a>` : ''}
                            <button class="btn btn-secondary btn-small" id="rb-${downloadId}" onclick="startRename(${downloadId})">Rename</button>
                        </div>
                    `;

                    grid.appendChild(card);
                });

                container.innerHTML = '';
                container.appendChild(countText);
                container.appendChild(grid);

            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>Could not load library</h2>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn" onclick="loadLibrary()">Try Again</button>
                    </div>
                `;
            }
        }

        function useInCreate(filename) {
            sessionStorage.setItem('lastDownloadFilename', filename);
            window.location.href = "{{ url_for('brand_video') }}";
        }

        // Patch 47A: Source video inline rename — display_name only, raw filename never changes.
        function startRename(downloadId) {
            const fnDiv = document.getElementById('fn-' + downloadId);
            const ra    = document.getElementById('ra-' + downloadId);
            const ri    = document.getElementById('ri-' + downloadId);
            const rb    = document.getElementById('rb-' + downloadId);
            const re    = document.getElementById('re-' + downloadId);
            if (!fnDiv || !ra || !ri) return;
            ri.value = fnDiv.textContent;
            if (re) { re.style.display = 'none'; re.textContent = ''; }
            fnDiv.style.display = 'none';
            ra.style.display = 'block';
            if (rb) rb.disabled = true;
            ri.focus();
            ri.select();
        }

        function cancelRename(downloadId) {
            const fnDiv = document.getElementById('fn-' + downloadId);
            const ra    = document.getElementById('ra-' + downloadId);
            const rb    = document.getElementById('rb-' + downloadId);
            if (fnDiv) fnDiv.style.display = '';
            if (ra)    ra.style.display = 'none';
            if (rb)    rb.disabled = false;
        }

        async function saveRename(downloadId) {
            const ri      = document.getElementById('ri-' + downloadId);
            const re      = document.getElementById('re-' + downloadId);
            const fnDiv   = document.getElementById('fn-' + downloadId);
            const area    = document.getElementById('ra-' + downloadId);
            const saveBtn = area ? area.querySelector('button') : null;
            if (!ri || !re || !fnDiv) return;

            const name = ri.value.trim();

            // Client-side validation (Patch 47A)
            if (!name) {
                re.textContent = 'Name cannot be empty.';
                re.style.display = 'block';
                return;
            }
            if (name.length > 80) {
                re.textContent = 'Name must be 80 characters or fewer.';
                re.style.display = 'block';
                return;
            }
            if (/[/\\]/.test(name)) {
                re.textContent = 'Name cannot contain / or \\.';
                re.style.display = 'block';
                return;
            }
            if (/[\x00-\x1f\x7f]/.test(name)) {
                re.textContent = 'Name contains invalid characters.';
                re.style.display = 'block';
                return;
            }

            if (saveBtn) saveBtn.disabled = true;
            re.style.display = 'none';

            try {
                const res = await fetch(`/api/downloads/${downloadId}/rename`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_name: name })
                });
                const data = await res.json();
                if (!res.ok) {
                    re.textContent = data.error || 'Rename failed. Please try again.';
                    re.style.display = 'block';
                    if (saveBtn) saveBtn.disabled = false;
                    return;
                }
                // Success: update card title in-place — no page reload needed
                fnDiv.textContent = data.display_name || name;
                cancelRename(downloadId);
            } catch (err) {
                re.textContent = 'Network error. Please try again.';
                re.style.display = 'block';
                if (saveBtn) saveBtn.disabled = false;
            }
        }

        async function toggleLibraryBookmarkFull(downloadId, btn) {
            if (btn) btn.disabled = true;
            try {
                const res = await fetch(`/api/downloads/${downloadId}/bookmark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!res.ok) throw new Error('Failed to toggle bookmark');

                const data = await res.json();
                await loadLibrary();
                console.log(`[Bookmark] Item ${downloadId} bookmarked: ${data.bookmarked}, Total: ${data.bookmark_count}`);
            } catch (err) {
                console.error('[Bookmark] Error:', err);
                if (btn) {
                    btn.disabled = false;
                    const orig = btn.textContent;
                    btn.textContent = orig + ' ⚠';
                    setTimeout(() => { if (btn) btn.textContent = orig; }, 3000);
                }
            }
        }

        async function toggleRenderBookmark(outputId, btn) {
            if (btn) btn.disabled = true;
            try {
                const res = await fetch(`/api/outputs/${outputId}/bookmark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'Could not save render.');
                    if (btn) btn.disabled = false;
                    return;
                }
                const isNowBookmarked = data.bookmarked === 1;
                if (btn) {
                    btn.textContent = isNowBookmarked ? 'Unsave' : 'Save';
                    btn.disabled = false;
                }
                const label = document.getElementById(`bm-label-${outputId}`);
                if (label) {
                    label.textContent = isNowBookmarked ? '★ Saved — won\'t expire' : '☆ Expires in 24h';
                    label.className = `bookmark-indicator${isNowBookmarked ? ' bookmarked' : ''}`;
                }
            } catch (err) {
                console.error('[RenderBookmark] Error:', err);
                if (btn) { btn.disabled = false; btn.textContent += ' ⚠'; }
            }
        }

        // --- Finished Renders ---

        let selectedRenderFiles = new Set();

        function toggleRenderSelection(cb) {
            const filename = cb.value;
            if (cb.checked) {
                selectedRenderFiles.add(filename);
            } else {
                selectedRenderFiles.delete(filename);
            }
            const card = cb.closest('.render-card');
            if (card) card.classList.toggle('selected', cb.checked);
            updateRendersToolbar();
        }

        function updateRendersToolbar() {
            const count = selectedRenderFiles.size;
            const countEl = document.getElementById('renders-sel-count');
            const dlBtn = document.getElementById('renders-dl-btn');
            if (countEl) countEl.textContent = count === 0 ? '0 selected' : `${count} selected`;
            if (dlBtn) dlBtn.disabled = count === 0;
            // Disable unchecked checkboxes once cap is reached; skip unavailable cards
            const cbs = document.querySelectorAll('.render-select-cb');
            cbs.forEach(cb => { if (!cb.checked && !cb.dataset.unavailable) cb.disabled = count >= 10; });
            // Clear any leftover error text on state change
            const errEl = document.getElementById('renders-toolbar-error');
            if (errEl) errEl.textContent = '';
        }

        function clearRenderSelection() {
            selectedRenderFiles.clear();
            document.querySelectorAll('.render-select-cb').forEach(cb => {
                cb.checked = false;
                if (!cb.dataset.unavailable) cb.disabled = false;
            });
            document.querySelectorAll('.render-card.selected').forEach(c => c.classList.remove('selected'));
            updateRendersToolbar();
        }

        function buildRendersToolbar() {
            const toolbar = document.createElement('div');
            toolbar.className = 'renders-toolbar';
            toolbar.id = 'renders-toolbar';
            toolbar.innerHTML = `
                <span class="renders-sel-count" id="renders-sel-count">0 selected</span>
                <button class="btn btn-small" id="renders-dl-btn" disabled onclick="downloadSelectedRenders()">Download Selected</button>
                <button class="btn btn-secondary btn-small" onclick="clearRenderSelection()">Clear</button>
                <span class="renders-cap-note">Max 10 files</span>
                <div class="renders-toolbar-error" id="renders-toolbar-error"></div>
            `;
            return toolbar;
        }

        async function downloadSelectedRenders() {
            const files = [...selectedRenderFiles];
            if (files.length === 0) return;
            const dlBtn = document.getElementById('renders-dl-btn');
            const errEl = document.getElementById('renders-toolbar-error');
            if (dlBtn) { dlBtn.disabled = true; dlBtn.textContent = 'Preparing…'; }
            if (errEl) errEl.textContent = '';
            try {
                const res = await fetch('/api/videos/download-zip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files })
                });
                if (!res.ok) {
                    let msg = `Download failed (${res.status})`;
                    try { const err = await res.json(); msg = err.message || err.error || msg; } catch {}
                    if (errEl) errEl.textContent = msg;
                    return;
                }
                const disposition = res.headers.get('Content-Disposition') || '';
                const match = disposition.match(/filename="?([^";]+)"?/);
                const zipName = match ? match[1] : 'brandr_selected_outputs.zip';
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = zipName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                if (errEl) errEl.textContent = `Download failed: ${err.message}`;
            } finally {
                if (dlBtn) {
                    dlBtn.disabled = selectedRenderFiles.size === 0;
                    dlBtn.textContent = 'Download Selected';
                }
            }
        }

        async function loadRenderedOutputs() {
            selectedRenderFiles.clear();
            const container = document.getElementById('renders-content');

            try {
                const response = await fetch('/api/outputs/branded?limit=200');
                if (!response.ok) {
                    throw new Error('Failed to load renders');
                }

                const data = await response.json();
                const outputs = data.outputs || [];

                if (outputs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎬</div>
                            <h2>No finished renders yet</h2>
                            <p>No finished renders yet. Create one from the Brand Cockpit.</p>
                            <a href="{{ url_for('brand_video') }}" class="btn">Go to Brand Cockpit</a>
                        </div>
                    `;
                    return;
                }

                // Count line
                const countText = document.createElement('p');
                countText.className = 'lib-count';
                countText.textContent = outputs.length >= 200
                    ? 'Showing latest 200 finished renders'
                    : `Showing ${outputs.length} finished render${outputs.length === 1 ? '' : 's'}`;

                // Group outputs by source_display_name, preserving insertion order (newest-first from API)
                const groups = new Map();
                outputs.forEach(output => {
                    const key = output.source_display_name || output.source_filename || 'Unknown source';
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(output);
                });

                // Build grouped sections
                const wrapper = document.createElement('div');

                groups.forEach((groupOutputs, sourceKey) => {
                    const section = document.createElement('div');
                    section.className = 'render-source-group';

                    const heading = document.createElement('div');
                    heading.className = 'render-source-heading';
                    heading.innerHTML = `${escapeHtml(sourceKey)}<span class="render-group-count">${groupOutputs.length} render${groupOutputs.length === 1 ? '' : 's'}</span>`;

                    const grid = document.createElement('div');
                    grid.className = 'media-grid';

                    groupOutputs.forEach(output => {
                        const card = document.createElement('div');
                        card.className = 'media-card render-card';

                        const brandName = output.brand_name || 'Unknown brand';
                        const formatKey = output.output_format || 'vertical_9_16';
                        const formatLabel = FORMAT_LABELS[formatKey] || formatKey;
                        const sourceLabel = output.source_display_name
                            ? output.source_display_name
                            : (output.source_filename
                                ? output.source_filename.replace(/\.mp4$/i, '')
                                : 'Unknown source');
                        const createdAt = output.created_at
                            ? new Date(output.created_at).toLocaleDateString()
                            : 'Unknown date';
                        const hasDimensions = output.width && output.height;
                        const dimensionsHtml = hasDimensions
                            ? `<div class="render-meta">Dimensions: ${output.width}×${output.height}</div>`
                            : '';
                        const outputFilename = output.output_filename || '';
                        const fileAvailable = output.file_available !== false;
                        const isBookmarked = output.bookmarked === 1;
                        const outputId = output.id;

                        card.innerHTML = `
                            <label class="render-select-label">
                                <input type="checkbox" class="render-select-cb"
                                       value="${escapeHtml(outputFilename)}"
                                       onchange="toggleRenderSelection(this)"
                                       ${fileAvailable ? '' : 'disabled data-unavailable="true"'}>
                                Select
                            </label>
                            ${!fileAvailable ? '<span class="render-unavailable-badge">Unavailable</span>' : ''}
                            <div class="brand-name">${escapeHtml(brandName)}</div>
                            <span class="format-badge">${escapeHtml(formatLabel)}</span>
                            <div class="render-meta">Source: ${escapeHtml(sourceLabel)}</div>
                            ${dimensionsHtml}
                            <div class="render-meta">${escapeHtml(createdAt)}</div>
                            <div class="bookmark-indicator ${isBookmarked ? 'bookmarked' : ''}" id="bm-label-${outputId}">
                                ${isBookmarked ? '★ Saved — won\'t expire' : '☆ Expires in 24h'}
                            </div>
                            <div class="render-actions">
                                ${fileAvailable
                                    ? `<a href="/api/videos/download/${encodeURIComponent(outputFilename)}" class="btn btn-secondary btn-small">Download</a>`
                                    : `<button class="btn btn-secondary btn-small" disabled>Download</button>`
                                }
                                <button class="btn btn-small btn-bookmark-toggle" id="bm-btn-${outputId}"
                                        onclick="toggleRenderBookmark(${outputId}, this)">
                                    ${isBookmarked ? 'Unsave' : 'Save'}
                                </button>
                            </div>
                        `;

                        grid.appendChild(card);
                    });

                    section.appendChild(heading);
                    section.appendChild(grid);
                    wrapper.appendChild(section);
                });

                container.innerHTML = '';
                container.appendChild(countText);
                container.appendChild(buildRendersToolbar());
                container.appendChild(wrapper);
                updateRendersToolbar();

            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>Could not load renders</h2>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn" onclick="loadRenderedOutputs()">Try Again</button>
                    </div>
                `;
            }
        }

        // Load both panels on page load
        loadLibrary();
        loadRenderedOutputs();
    </script>
</body>
</html>
