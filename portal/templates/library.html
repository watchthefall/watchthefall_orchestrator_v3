<!DOCTYPE html>
<html lang="en" data-tier="{{ tier|default('Explorer') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - Brandr</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #121214;
            color: #EAEAEA;
            min-height: 100vh;
        }
        
        /* Nav styles provided by _nav.html partial */
        
        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .subtitle {
            color: #808080;
            margin-bottom: 2rem;
        }
        
        /* Actions */
        .actions {
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--accent);
            color: #121214;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn-secondary {
            background-color: #2d2d2d;
            color: #EAEAEA;
            border: 1px solid #3a3a3a;
        }
        .btn-secondary:hover {
            background-color: #3a3a3a;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background-color: #2d2d2d;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .empty-state h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .empty-state p {
            color: #808080;
            margin-bottom: 1.5rem;
        }
        
        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .media-card {
            background-color: #2d2d2d;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s ease;
        }
        .media-card:hover {
            border-color: var(--accent);
        }
        .media-card .filename {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .source {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .media-card .meta {
            font-size: 0.8rem;
            color: #808080;
            margin-bottom: 12px;
        }
        .media-card .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .status.available {
            background-color: var(--accent-soft);
            color: var(--accent);
        }
        .status.missing {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .media-card .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }
        .media-card .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .media-card .bookmark-indicator {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
        }
        .media-card .bookmark-indicator.bookmarked {
            color: var(--accent);
            font-weight: 600;
        }
        .btn-bookmark-toggle {
            background: transparent;
            border: 1px solid #444;
            color: #666;
        }
        .btn-bookmark-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    {% set active_page = 'library' %}
    {% include '_nav.html' %}
    
    <div class="container">
        <h1>Library</h1>
        <p class="subtitle">Your saved source media</p>
        
        <div class="actions">
            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
        </div>
        
        <div id="library-content">
            <div class="loading">Loading your media...</div>
        </div>
    </div>
    
    <script>
        async function loadLibrary() {
            const container = document.getElementById('library-content');
            
            try {
                const response = await fetch('/api/downloads/recent?limit=50');
                if (!response.ok) {
                    throw new Error('Failed to load library');
                }
                
                const data = await response.json();
                const downloads = data.downloads || [];
                
                if (downloads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📁</div>
                            <h2>No media yet</h2>
                            <p>Download some content to see it here</p>
                            <a href="{{ url_for('download') }}" class="btn">Get New Media</a>
                        </div>
                    `;
                    return;
                }
                
                const grid = document.createElement('div');
                grid.className = 'media-grid';
                
                downloads.forEach(download => {
                    const card = document.createElement('div');
                    card.className = 'media-card';
                    
                    const filename = download.filename || 'Unknown file';
                    const sourceUrl = download.source_url || '';
                    const truncatedUrl = sourceUrl.length > 50 ? sourceUrl.substring(0, 50) + '...' : sourceUrl;
                    const createdAt = download.created_at ? new Date(download.created_at).toLocaleDateString() : 'Unknown date';
                    const isAvailable = download.file_exists;
                    const isBookmarked = download.bookmarked === 1;
                    const downloadId = download.id;
                    
                    card.innerHTML = `
                        <div class="filename">${escapeHtml(filename)}</div>
                        <div class="source">${escapeHtml(truncatedUrl)}</div>
                        <div class="meta">${escapeHtml(createdAt)}</div>
                        <span class="status ${isAvailable ? 'available' : 'missing'}">${isAvailable ? 'Available' : 'File missing'}</span>
                        <div class="bookmark-indicator ${isBookmarked ? 'bookmarked' : ''}">
                            ${isBookmarked ? '★ Bookmarked' : '☆ Not bookmarked'}
                        </div>
                        <div class="actions">
                            <button class="btn btn-small btn-bookmark-toggle" onclick="toggleLibraryBookmarkFull(${downloadId}, this)">
                                ${isBookmarked ? 'Remove Bookmark' : 'Bookmark'}
                            </button>
                            ${isAvailable ? `<button class="btn btn-small" onclick="useInCreate('${escapeHtml(filename)}')">Use in Create</button>` : ''}
                            ${download.file_path ? `<a href="/portal/download-file/${download.id}" class="btn btn-secondary btn-small" download>Download</a>` : ''}
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                container.innerHTML = '';
                container.appendChild(grid);
                
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h2>Could not load library</h2>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn" onclick="loadLibrary()">Try Again</button>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function useInCreate(filename) {
            sessionStorage.setItem('lastDownloadFilename', filename);
            window.location.href = "{{ url_for('brand_video') }}";
        }
        
        async function toggleLibraryBookmarkFull(downloadId, btn) {
            try {
                const res = await fetch(`/api/downloads/${downloadId}/bookmark`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!res.ok) throw new Error('Failed to toggle bookmark');
                
                const data = await res.json();
                
                // Reload library to reflect changes
                await loadLibrary();
                
                console.log(`[Bookmark] Item ${downloadId} bookmarked: ${data.bookmarked}, Total: ${data.bookmark_count}`);
            } catch (err) {
                console.error('[Bookmark] Error:', err);
                alert('Failed to update bookmark. Please try again.');
            }
        }
        
        // Load library on page load
        loadLibrary();
    </script>
</body>
</html>
