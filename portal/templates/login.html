<!DOCTYPE html>
<html lang="en" data-tier="{{ tier|default('Explorer') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRANDR</title>
    <meta name="theme-color" content="#0b0b0f">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/brandr_icon.png') }}">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #2d2d2d;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            border: 1px solid #3a3a3a;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #3a3a3a;
            color: #e0e0e0;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-group input::placeholder {
            color: #666;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .alert {
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .alert-error {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .alert-success {
            background-color: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent-border);
        }
        .signup-link {
            text-align: center;
            margin-top: 1rem;
            color: #808080;
        }
        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .signup-link a:hover {
            color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="/static/img/brandr_logo.png" alt="Brandr" style="width: 80px; height: 80px; object-fit: contain; display: block; margin: 0 auto 16px;">
        <h2>Brandr Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="signup-link">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a>
        </div>
    </div>
</body>
</html>
