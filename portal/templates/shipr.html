<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipr - Brandr</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #121214;
            color: #EAEAEA;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        /* Nav styles provided by _nav.html partial */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background-color: #121214;
            color: #ffffff;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .main-content {
            padding: 2rem;
            text-align: center;
        }
        .coming-soon {
            padding: 2rem;
        }
        .coming-soon h2 {
            color: #ffffff;
            margin-bottom: 1rem;
        }
        .coming-soon p {
            color: #a0a0a0;
            margin-bottom: 2rem;
        }
        .waitlist-form {
            max-width: 400px;
            margin: 0 auto;
        }
        .waitlist-form h3 {
            color: #EAEAEA;
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #a0a0a0;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            border-radius: 8px;
            box-sizing: border-box;
            background: #222;
            color: #fff;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #86EDA5;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background-color: #86EDA5;
            color: #121214;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #6BDB8B;
        }
    </style>
</head>
<body>
    {% set active_page = 'shipr_page' %}
    {% include '_nav.html' %}
    <div class="container">
        <div class="header">
            <h1>Brandr - Shipr</h1>
        </div>
        <div class="main-content">
            <div class="coming-soon">
                <h2>Coming Soon!</h2>
                <p>The Shipr feature is currently under development. Stay tuned for updates!</p>
                
                <div class="waitlist-form">
                    <h3>Join the Waitlist</h3>
                    <form id="waitlistForm">
                        <div class="form-group">
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <button type="submit" class="btn">Notify Me</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('waitlistForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // In a real implementation, you would submit the email to your backend
            alert('Thank you! We will notify you when Shipr is available.');
            
            // Reset the form
            this.reset();
        });
    </script>
</body>
</html>
