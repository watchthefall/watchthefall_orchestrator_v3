<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipr - Brandr</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .nav-bar {
            background-color: #444;
            padding: 0.5rem;
        }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            flex-wrap: nowrap;
            justify-content: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .nav-links::-webkit-scrollbar {
            display: none;
        }
        .nav-links li {
            margin-right: 1rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background-color: #555;
        }
        .nav-links .active {
            background-color: #007bff;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            right: 0;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .main-content {
            padding: 2rem;
            text-align: center;
        }
        .coming-soon {
            padding: 2rem;
        }
        .coming-soon h2 {
            color: #333;
            margin-bottom: 1rem;
        }
        .coming-soon p {
            color: #666;
            margin-bottom: 2rem;
        }
        .waitlist-form {
            max-width: 400px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .logout-section {
            text-align: right;
            padding: 1rem;
        }
        .logout-btn {
            background-color: #dc3545;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Brandr - Shipr</h1>
        </div>
        {% set active_page = 'shipr_page' %}
        {% include '_nav.html' %}
        <div class="main-content">
            <div class="coming-soon">
                <h2>Coming Soon!</h2>
                <p>The Shipr feature is currently under development. Stay tuned for updates!</p>
                
                <div class="waitlist-form">
                    <h3>Join the Waitlist</h3>
                    <form id="waitlistForm">
                        <div class="form-group">
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <button type="submit" class="btn">Notify Me</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('waitlistForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // In a real implementation, you would submit the email to your backend
            alert('Thank you! We will notify you when Shipr is available.');
            
            // Reset the form
            this.reset();
        });
    </script>
</body>
</html>
