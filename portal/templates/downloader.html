<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader - WTF Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .nav-bar {
            background-color: #444;
            padding: 0.5rem;
        }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links li {
            margin-right: 1rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background-color: #555;
        }
        .nav-links .active {
            background-color: #007bff;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            right: 0;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .main-content {
            padding: 2rem;
        }
        .section {
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        .logout-section {
            text-align: right;
            padding: 1rem;
        }
        .logout-btn {
            background-color: #dc3545;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WTF Studio - Downloader</h1>
        </div>
        <div class="nav-bar">
            <ul class="nav-links">
                <li><a href="{{ url_for('download') }}" class="active">Downloader</a></li>
                <li><a href="{{ url_for('brand_video') }}">Brand a Video</a></li>
                <li><a href="{{ url_for('brands_page') }}">Manage Brands</a></li>
                <li><a href="{{ url_for('shipr_page') }}">Shipr (Coming Soon)</a></li>
                <li class="dropdown">
                    <a href="#">Account</a>
                    <div class="dropdown-content">
                        <a href="#">Profile</a>
                        <a href="{{ url_for('logout') }}">Logout</a>
                    </div>
                </li>
            </ul>
        </div>
        <div class="main-content">
            <div class="section">
                <h2>Paste Link</h2>
                <form id="downloadForm">
                    <div class="form-group">
                        <label for="videoUrl">TikTok / Instagram / X / YouTube Link:</label>
                        <input type="url" id="videoUrl" name="videoUrl" placeholder="https://www.tiktok.com/..." required>
                    </div>
                    <button type="submit" class="btn">Download</button>
                </form>
            </div>
            
            <div class="section">
                <h2>Results</h2>
                <div id="results" class="results" style="display:none;">
                    <p id="resultMessage">Download completed!</p>
                    <div id="downloadButtons" style="display:none;">
                        <button id="downloadOriginalBtn" class="btn btn-success">Download Original MP4</button>
                        <button id="continueToBrandrBtn" class="btn btn-secondary">Continue to Brandr</button>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h2>Recent Downloads</h2>
                <div id="recentDownloads" class="results">
                    <p>Loading recent downloads...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDownloadId = null;
        let currentFilePath = null;
        
        document.getElementById('downloadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const videoUrl = document.getElementById('videoUrl').value;
            const resultsDiv = document.getElementById('results');
            const resultMessage = document.getElementById('resultMessage');
            const downloadButtons = document.getElementById('downloadButtons');
            
            if (!videoUrl) {
                alert('Please enter a valid URL');
                return;
            }
            
            // Show loading state
            resultMessage.textContent = 'Downloading...';
            resultsDiv.style.display = 'block';
            downloadButtons.style.display = 'none';
            
            try {
                // Fetch video from URL
                const response = await fetch('/api/videos/fetch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        urls: [videoUrl]
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.results && data.results.length > 0) {
                    const result = data.results[0];
                    if (result.success) {
                        // Save download to database
                        const saveResponse = await fetch('/api/videos/save-download', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                source_url: videoUrl,
                                filename: result.filename,
                                file_path: result.local_path
                            })
                        });
                        
                        const saveData = await saveResponse.json();
                        
                        if (saveData.success) {
                            currentDownloadId = saveData.download_id;
                            currentFilePath = result.local_path;
                            
                            resultMessage.textContent = 'Download completed successfully!';
                            downloadButtons.style.display = 'block';
                            
                            // Set up button click handlers
                            document.getElementById('downloadOriginalBtn').onclick = function() {
                                window.open(`/api/videos/download-original/${currentDownloadId}`, '_blank');
                            };
                            
                            document.getElementById('continueToBrandrBtn').onclick = function() {
                                // Store only the filename for Brandr to access
                                sessionStorage.setItem('lastDownloadFilename', result.filename);
                                window.location.href = "{{ url_for('brand_video') }}";
                            };
                        } else {
                            resultMessage.textContent = 'Download completed but failed to save: ' + (saveData.error || 'Unknown error');
                        }
                    } else {
                        resultMessage.textContent = 'Download failed: ' + (result.error || 'Unknown error');
                    }
                } else {
                    resultMessage.textContent = 'Download failed: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                console.error('Error:', error);
                resultMessage.textContent = 'An error occurred: ' + error.message;
            }
            
            // Refresh recent downloads
            loadRecentDownloads();
        });
        
        async function loadRecentDownloads() {
            try {
                const response = await fetch('/api/downloads/recent', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayRecentDownloads(data.downloads);
                } else {
                    document.getElementById('recentDownloads').innerHTML = '<p>Error loading recent downloads: ' + (data.error || 'Unknown error') + '</p>';
                }
            } catch (error) {
                console.error('Error loading recent downloads:', error);
                document.getElementById('recentDownloads').innerHTML = '<p>Error loading recent downloads: ' + error.message + '</p>';
            }
        }
        
        function displayRecentDownloads(downloads) {
            const container = document.getElementById('recentDownloads');
            
            if (downloads.length === 0) {
                container.innerHTML = '<p>No recent downloads found.</p>';
                return;
            }
            
            let html = '<table style="width:100%; border-collapse: collapse;">';
            html += '<tr style="background-color: #f0f0f0;">';
            html += '<th style="padding: 8px; border: 1px solid #ddd;">Source URL</th>';
            html += '<th style="padding: 8px; border: 1px solid #ddd;">Date</th>';
            html += '<th style="padding: 8px; border: 1px solid #ddd;">Actions</th>';
            html += '</tr>';
            
            downloads.forEach(download => {
                const truncatedUrl = download.source_url.length > 30 ? download.source_url.substring(0, 30) + '...' : download.source_url;
                const date = new Date(download.created_at).toLocaleString();
                
                html += '<tr>';
                html += `<td style="padding: 8px; border: 1px solid #ddd;">${truncatedUrl}</td>`;
                html += `<td style="padding: 8px; border: 1px solid #ddd;">${date}</td>`;
                html += '<td style="padding: 8px; border: 1px solid #ddd;">';
                
                if (download.file_exists) {
                    html += `<button class="btn btn-success" onclick="downloadOriginal(${download.id})" style="margin-right: 5px;">Download</button>`;
                    html += `<button class="btn btn-secondary" onclick="continueToBrandrFromDownload('${download.file_path}', '${download.filename}')">Brandr</button>`;
                } else {
                    html += '<span style="color: #666;">Expired</span>';
                }
                
                html += '</td>';
                html += '</tr>';
            });
            
            html += '</table>';
            container.innerHTML = html;
        }
        
        function downloadOriginal(downloadId) {
            window.open(`/api/videos/download-original/${downloadId}`, '_blank');
        }
        
        function continueToBrandrFromDownload(filePath, filename) {
            // Store only the filename for Brandr to access
            sessionStorage.setItem('lastDownloadFilename', filename);
            window.location.href = "{{ url_for('brand_video') }}";
        }
        
        // Load recent downloads when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadRecentDownloads();
        });
    </script>
</body>
</html>
