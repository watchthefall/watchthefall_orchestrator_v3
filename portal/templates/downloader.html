<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader - WTF Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .nav-bar {
            background-color: #444;
            padding: 0.5rem;
        }
        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links li {
            margin-right: 1rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background-color: #555;
        }
        .nav-links .active {
            background-color: #007bff;
        }
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            right: 0;
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .main-content {
            padding: 2rem;
        }
        .section {
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        .logout-section {
            text-align: right;
            padding: 1rem;
        }
        .logout-btn {
            background-color: #dc3545;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WTF Studio - Downloader</h1>
        </div>
        <div class="nav-bar">
            <ul class="nav-links">
                <li><a href="{{ url_for('download') }}" class="active">Downloader</a></li>
                <li><a href="{{ url_for('brand_video') }}">Brand a Video</a></li>
                <li><a href="{{ url_for('brands_page') }}">Manage Brands</a></li>
                <li><a href="{{ url_for('shipr_page') }}">Shipr (Coming Soon)</a></li>
                <li class="dropdown">
                    <a href="#">Account</a>
                    <div class="dropdown-content">
                        <a href="#">Profile</a>
                        <a href="{{ url_for('logout') }}">Logout</a>
                    </div>
                </li>
            </ul>
        </div>
        <div class="main-content">
            <div class="section">
                <h2>Paste Link</h2>
                <form id="downloadForm">
                    <div class="form-group">
                        <label for="videoUrl">TikTok / Instagram / X / YouTube Link:</label>
                        <input type="url" id="videoUrl" name="videoUrl" placeholder="https://www.tiktok.com/..." required>
                    </div>
                    <button type="submit" class="btn">Download</button>
                </form>
            </div>
            
            <div class="section">
                <h2>Results</h2>
                <div id="results" class="results" style="display:none;">
                    <p>Download completed!</p>
                    <button class="btn btn-success">Download Original MP4</button>
                    <button class="btn btn-secondary" onclick="continueToBrandr()">Continue to Brandr</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const videoUrl = document.getElementById('videoUrl').value;
            
            // In a real implementation, you would make an API call here
            // For now, we'll just show the results div
            setTimeout(function() {
                document.getElementById('results').style.display = 'block';
            }, 1000);
        });
        
        function continueToBrandr() {
            // Redirect to the brandr page
            window.location.href = "{{ url_for('brand_video') }}";
        }
    </script>
</body>
</html>
